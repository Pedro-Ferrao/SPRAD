<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SP Rad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="index.html#cursos" class="btn-back">
        &larr; Voltar
    </a>

    <div class="container">
        <img src="Imagens/em_breve.jpeg" alt="Em Breve">
    </div>

</body>
</html>

<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #000000;
    color: #ffffff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Centralização da Imagem */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
}

img {
    max-width: 85%;
    max-height: 75vh;
    height: auto;
    display: block;
}

.btn-back {
    position: absolute;
    top: 30px;
    left: 30px;
    color: #ffffff;
    text-decoration: none;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 10px 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 4px;
    transition: all 0.3s ease;
    z-index: 10;
}

.btn-back:hover {
    background-color: #ffffff;
    color: #000000;
    border-color: #ffffff;
}


@media (max-width: 600px) {
    .btn-back {
        top: 20px;
        left: 20px;
        font-size: 12px;
        padding: 8px 15px;
    }
}
</style>
